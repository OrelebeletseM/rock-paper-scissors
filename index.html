<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 50px;
        }
        button {
            font-size: 20px;
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #45a049;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        #results {
            margin: 20px auto;
            padding: 10px;
            width: 80%;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        #score {
            font-size: 20px;
            margin: 20px;
            font-weight: bold;
        }
        #winner {
            margin: 20px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <h1>✊ Rock Paper Scissors ✋✌️</h1>
    <p>First to 5 points wins!</p>
    
    <div>
        <button id="rock">🪨 Rock</button>
        <button id="paper">📄 Paper</button>
        <button id="scissors">✂️ Scissors</button>
    </div>
    
    <!-- Optional reset button - uncomment if you want it -->
    <!-- <button id="reset">🔄 Reset Game</button> -->
    
    <div id="score">📊 Score - You: 0 | Computer: 0</div>
    <div id="results"></div>
    <div id="winner"></div>

    <script src="script.js"></script>
</body>
</html>
